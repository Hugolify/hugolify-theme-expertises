module:
  mounts:
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: content
      target: content
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts

# Params
params:

  # Hugolify admin
  admin:
    collections:
      expertises:
        enable: true
        filter:
          - field: isIndex
            value: false
        icon:
          bootstrap_icons: mortarboard
          iconoir: graduation-cap
          material_icons: school
          material_symbols: school
          lucide: graduation-cap

  # Image
  expertises:
    thumbnail:
      desktop: '418x200'
      mobile: '300x129'
      scrollsnap: '240x103'
      sizes: 100vw, 50vw, 33vw
    image:
      desktop: '420x'
      sizes: 100vw, 50vw, 33vw

# Permalinks
permalinks:
  page:
    expertises: /expertises/:slug/

